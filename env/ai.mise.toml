[env]
AI_GH_TOKEN = "{{ exec(command='security find-generic-password -s gh-token-read-only -w 2>/dev/null || true') }}"
AI_GITHUB_TOKEN = "{{ exec(command='security find-generic-password -s gh-token-read-only -w 2>/dev/null || true') }}"
ES_STAGING_URL = "https://elastic.ghostfoundation.org"
ES_PRODUCTION_URL = "https://elastic.ghost.org"
ES_USER = "readonly"
ES_STAGING_PASSWORD = "{{ exec(command='security find-generic-password -s es-staging-password -w 2>/dev/null || true') }}"
ES_PRODUCTION_PASSWORD = "{{ exec(command='security find-generic-password -s es-production-password -w 2>/dev/null || true') }}"
PROMETHEUS_STAGING_URL = "https://prometheus.ghostfoundation.org"
PROMETHEUS_PRODUCTION_URL = "https://prometheus.ghost.org"

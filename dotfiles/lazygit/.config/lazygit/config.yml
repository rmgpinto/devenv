git:
  overrideGpg: true
  pagers:
    - colorArg: always
      pager: delta --paging=never --side-by-side
os:
  open: >-
    (ROOT=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree / {print $2; exit}');
    ROOT=${ROOT:-$PWD};
    [ "$(basename "$(dirname "$ROOT")")" = ".worktrees" ] && ROOT=$(dirname "$(dirname "$ROOT")");
    CWD=$(basename "$ROOT");
    BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null);
    [ "$BRANCH" = HEAD ] && BRANCH=;
    SESSION="${CWD}${BRANCH:+-${BRANCH}}";
    SESSION=$(printf '%.60s' "$SESSION");
    SOCK="/tmp/nvim-${SESSION}.sock";
    [ -S "$SOCK" ] && nvim --server "$SOCK" --remote-silent "{{filename}}" && pkill -TERM -x lazygit) &
# catppuccin mocha-blue: https://github.com/catppuccin/lazygit
gui:
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  authorColors:
    '*': '#b4befe'

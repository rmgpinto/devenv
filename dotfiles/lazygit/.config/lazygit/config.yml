git:
  overrideGpg: true
  pagers:
    - colorArg: always
      pager: delta --paging=never --side-by-side
os:
  open: '([ -S /tmp/nvim-${ZELLIJ_SESSION_NAME}.sock ] && nvim --server /tmp/nvim-${ZELLIJ_SESSION_NAME}.sock --remote-silent "{{filename}}" && pkill -TERM -x lazygit) &'
customCommands:
  - key: "W"
    description: "Create worktree from main"
    command: "git worktree add '../{{.Form.WorktreeName}}' -b '{{.Form.WorktreeName}}' main"
    context: "localBranches"
    prompts:
      - type: "input"
        title: "Worktree/branch name:"
        key: "WorktreeName"
theme:
  activeBorderColor:
    - '#89b4fa'
    - bold
  cherryPickedCommitBgColor:
    - '#45475a'
  cherryPickedCommitFgColor:
    - '#89b4fa'
  defaultFgColor:
    - '#cdd6f4'
  inactiveBorderColor:
    - '#a6adc8'
  optionsTextColor:
    - '#89b4fa'
  searchingActiveBorderColor:
    - '#f9e2af'
  selectedLineBgColor:
    - '#313244'
  unstagedChangesColor:
    - '#f38ba8'

git:
  overrideGpg: true
  pagers:
    - colorArg: always
      pager: delta --paging=never --side-by-side
os:
  open: >-
    ROOT=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree / {print $2; exit}');
    ROOT=${ROOT:-$PWD};
    [ "$(basename "$(dirname "$ROOT")")" = ".worktrees" ] && ROOT=$(dirname "$(dirname "$ROOT")");
    CWD=$(basename "$ROOT");
    SESSION=${ZELLIJ_SESSION_NAME:-};
    if [ -z "$SESSION" ]; then
      BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null);
      [ "$BRANCH" = HEAD ] && BRANCH=;
      BRANCH=$(printf '%s' "$BRANCH" | tr / -);
      SESSION="${CWD}${BRANCH:+-${BRANCH}}";
      SESSION=$(printf '%.60s' "$SESSION");
    fi;
    SOCK="/tmp/nvim-${SESSION}.sock";
    if [ ! -S "$SOCK" ]; then
      SOCK=$(ls -t /tmp/nvim-${CWD}-*.sock 2>/dev/null | head -n 1);
    fi;
    NVIM="$HOME/.local/share/mise/installs/aqua-neovim-neovim/latest/nvim-macos-arm64/bin/nvim";
    if [ -S "$SOCK" ]; then
      PANE_ID=$(zellij action list-panes --json 2>/dev/null |
        jq -r '.[] | select((.is_plugin | not) and (.is_floating | not) and .title == "nvim") | "terminal_\(.id)"' |
        head -n 1);
      LINE=$({ git diff --no-color --unified=0 -- "{{filename}}"; git diff --cached --no-color --unified=0 -- "{{filename}}"; } |
        sed -n 's/^@@ -[0-9][0-9]*\(,[0-9][0-9]*\)\{0,1\} +\([0-9][0-9]*\)\(,[0-9][0-9]*\)\{0,1\} @@.*/\2/p' |
        awk '{ line = $1 > 0 ? $1 : 1; if (!first || line < first) first = line } END { if (first) print first }');
      if "$NVIM" --server "$SOCK" --remote-silent "{{filename}}"; then
        [ -z "$LINE" ] || "$NVIM" --server "$SOCK" --remote-expr "cursor($LINE, 1)" >/dev/null;
        if [ -n "$PANE_ID" ]; then
          zellij action hide-floating-panes;
          zellij action focus-pane-id "$PANE_ID" >/dev/null 2>&1 || true;
        fi;
      fi;
    fi
customCommands:
  - key: C
    context: localBranches
    description: Create pull request
    loadingText: Creating pull request…
    command: >-
      git push --set-upstream origin {{.SelectedLocalBranch.Name | quote}} &&
      gh pr create --head {{.SelectedLocalBranch.Name | quote}} --fill
    output: popup
# catppuccin mocha-blue: https://github.com/catppuccin/lazygit
gui:
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    searchingActiveBorderColor:
      - '#f9e2af'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    inactiveViewSelectedLineBgColor:
      - '#6c7086'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    cherryPickedCommitBgColor:
      - '#45475a'
    markedBaseCommitFgColor:
      - '#89b4fa'
    markedBaseCommitBgColor:
      - '#f9e2af'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
  authorColors:
    '*': '#b4befe'
